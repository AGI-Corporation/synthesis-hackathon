# AgentPass CI - GitHub Actions
# Runs on every push and PR to main

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  contract-tests:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - run: npm run test:gas
        env:
          REPORT_GAS: "true"
        continue-on-error: true

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install black
      - run: black --check agent.py register.py
        continue-on-error: true

  security:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure .env files are not committed
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.local$'; then
            echo "ERROR: .env file is tracked by git!"
            exit 1
          fi
          echo "OK: no .env files tracked"
